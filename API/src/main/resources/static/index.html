<!DOCTYPE html> <html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- NAVBAR BOOTSTRAP-->
    <nav class="navbar navbar-expand-lg" style="background-color: #58b12f;" data-bs-theme="light">
        <div class="container-fluid">
            <a class="navbar-brand" href="/index.html">LOGO TIENDA</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav">
                    <a class="nav-link" href="#" onclick="listarProductos()">Productos</a>
                    <a class="nav-link" href="#" onclick="mostrarFormulario()">Nuevo Producto</a>
                </div>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <!-- FORMULARIO (Sólo se verá cuando insertes o modificas un producto)-->
        <div id="formulario" style="display:none">
            <h3>Nuevo Producto</h3>
            <input type="hidden" id="productoId">
            <div class="mb-3">
                <label>Nombre</label>
                <input type="text" id="nombre" class="form-control">
            </div>
            <div class="mb-3">
                <label>Precio</label>
                <input type="number" id="precio" class="form-control">
            </div>
            <div class="mb-3">
                <label>URL imagen</label>
                <input type="text" id="imagen" class="form-control">
            </div>
            <button class="btn btn-success" onclick="guardarProducto()">Guardar</button>
        </div>
        <!-- LISTADO DE PRODUCTOS EN LA BD ACTUAL-->
        <div id="productos" class="row"></div>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
