<!DOCTYPE html> <html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Productos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-4 mb-3" th:each="prod : ${productos}">
            <div class="card">
                <img th:src="@{${prod.imagen}}" class="card-img-top" th:alt="${prod.nombre}">
                <div class="card-body">
                    <h5 class="card-title" th:text="${prod.nombre}">Nombre</h5>
                    <button class="btn btn-primary" 
                            data-bs-toggle="modal" 
                            th:data-bs-target="'#modal-' + ${prod.nombre.replaceAll(' ','-')}">
                        Ver detalle
                    </button>
                </div>
            </div>
            <!-- Modal -->
            <div class="modal fade" th:id="'modal-' + ${prod.nombre.replaceAll(' ','-')}" tabindex="-1">
              <div class="modal-dialog">
                <div class="modal-content">
                  <div class="modal-header">
                    <h5 class="modal-title" th:text="${prod.nombre}">Producto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                  </div>
                  <div class="modal-body">
                    <img th:src="@{${prod.imagen}}" class="img-fluid mb-2">
                    <p th:text="${prod.descripcion}">Descripción</p>
                  </div>
                  <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                  </div>
                </div>
              </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
